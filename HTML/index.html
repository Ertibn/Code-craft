<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Common html</title>
</head>

<body>
    <h2>Fruit Comparison</h2>
    <table border="1">
        <thead>
            <tr>
                <th>Fruit</th>
                <th>Taste</th>
                <th>Common Use</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Apple</td>
                <td>sweet</td>
                <td>snacking,pies</td>
            </tr>
            <tr>
                <td>Lemon</td>
                <td>Sour</td>
                <td>Juices,seasoning</td>
            </tr>
            <tr>
                <td>Banana</td>
                <td>sweet</td>
                <td>smoothies,snacks</td>
            </tr>
        </tbody>
    </table>
    <!-- Form -->
    <h3>join the network</h3>
    <form action="">
        <input type="text" placeholder="first name" />
        <input type="email" placeholder="email" />
        <input type="password" placeholder="password" />
        <p><textarea name="comment" id="" cols="50" rows="5"></textarea></p>

        <p> <button type="summit">summit</button></p>
    </form>

    <!-- Another way of form -->
    <h3>contact us</h3>
    <form action="" method="post">
        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name" required><br>

        <label for="name">email:</label><br>
        <input type="email" id="name" name="email" required><br>
        <label for="message">Message:</label><br>
        <textarea name="message" id="message" rows="4" required></textarea><br>
        <input type="submit" value="submit">



    </form>
</body>

</html>
